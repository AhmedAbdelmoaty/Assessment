<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Learning Assessment Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 48px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .auth-logo {
            font-size: 48px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--foreground);
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--muted-foreground);
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--foreground);
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-error {
            color: var(--destructive);
            font-size: 14px;
            margin-top: 6px;
        }
        .form-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .form-btn:hover {
            filter: brightness(0.95);
        }
        .form-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .form-link {
            text-align: center;
            margin-top: 24px;
            color: var(--muted-foreground);
        }
        .form-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .form-link a:hover {
            text-decoration: underline;
        }
        .success-notice {
            background: #D4EDDA;
            border: 1px solid #28A745;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            color: #155724;
        }
    </style>
</head>
<body>
    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">English</button>
        <button class="lang-btn" data-lang="ar">عربي</button>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-chart-line"></i>
            </div>

            <h1 class="auth-title" data-lang-content="en">Welcome Back</h1>
            <h1 class="auth-title hidden" data-lang-content="ar">مرحباً بعودتك</h1>
            <p class="auth-subtitle" data-lang-content="en">Login to continue your learning journey</p>
            <p class="auth-subtitle hidden" data-lang-content="ar">سجل الدخول لمتابعة رحلة التعلم</p>

            <div id="successMessage" class="success-notice" style="display:none;"></div>
            <div id="errorMessage" class="form-error" style="display:none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" data-lang-content="en">Email</label>
                    <label class="form-label hidden" data-lang-content="ar">البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label" data-lang-content="en">Password</label>
                    <label class="form-label hidden" data-lang-content="ar">كلمة المرور</label>
                    <input type="password" id="password" class="form-input" required>
                </div>

                <button type="submit" class="form-btn" id="loginBtn">
                    <span data-lang-content="en">Login</span>
                    <span class="hidden" data-lang-content="ar">تسجيل الدخول</span>
                </button>
            </form>

            <div class="form-link">
                <span data-lang-content="en">Don't have an account?</span>
                <span class="hidden" data-lang-content="ar">ليس لديك حساب؟</span>
                <a href="/signup.html">
                    <span data-lang-content="en">Sign Up</span>
                    <span class="hidden" data-lang-content="ar">إنشاء حساب</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en';

        // Check for success message from signup
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('verified') === 'true') {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = currentLang === 'ar' ? 
                'تم التحقق من حسابك بنجاح! الرجاء تسجيل الدخول.' :
                'Account verified successfully! Please login.';
            successDiv.style.display = 'block';
        }

        // Language toggle
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                currentLang = this.getAttribute('data-lang');
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                document.documentElement.setAttribute('lang', currentLang);
                document.documentElement.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
                
                document.querySelectorAll('[data-lang-content]').forEach(el => {
                    el.classList.toggle('hidden', el.getAttribute('data-lang-content') !== currentLang);
                });
            });
        });

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    return;
                }
                
                // Redirect to dashboard
                window.location.href = '/dashboard.html';
                
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
