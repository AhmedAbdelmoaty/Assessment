<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Learning Assessment Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="/js/header.js"></script>
    <style>
        body { margin: 0; font-family: var(--font-sans); padding-top: 80px; }
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .dash-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--foreground);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }
        .info-item {
            padding: 12px;
            background: var(--muted);
            border-radius: 8px;
        }
        .info-label {
            font-size: 12px;
            color: var(--muted-foreground);
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--foreground);
        }
        .edit-btn {
            margin-top: 16px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .assessment-item {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .assessment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--muted);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--muted-foreground);
        }
        .placeholder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .placeholder-card {
            aspect-ratio: 16/9;
            background: var(--muted);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted-foreground);
        }
    </style>
</head>
<body>
    <!-- Protected Page Header: Same as Chat -->
    <div class="chat-header" id="dashboardHeader">
        <!-- Logo -->
        <img
            src="/assets/imp-logo.jpeg"
            alt="IMP - Institute of Management Professionals"
            class="brand-logo"
        />

        <!-- Navigation Tabs -->
        <div class="header-nav" style="display: flex; gap: 12px; margin-left: 24px;">
            <a href="/dashboard.html" class="nav-tab active">
                <span data-lang-content="en">Dashboard</span>
                <span class="hidden" data-lang-content="ar">لوحة التحكم</span>
            </a>
            <a href="/chat.html" class="nav-tab">
                <span data-lang-content="en">Chat</span>
                <span class="hidden" data-lang-content="ar">الدردشة</span>
            </a>
        </div>

        <!-- Logout Button -->
        <button id="logoutBtn" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i>
            <span data-lang-content="en">Logout</span>
            <span class="hidden" data-lang-content="ar">خروج</span>
        </button>

        <!-- Single Language Toggle -->
        <div id="lang-switch"></div>
    </div>

    <div class="dashboard-container">
        <!-- My Info -->
        <div class="dash-section">
            <h2 class="section-title">
                <i class="fas fa-user"></i>
                <span data-lang-content="en">My Info</span>
                <span class="hidden" data-lang-content="ar">معلوماتي</span>
            </h2>
            <div class="info-grid" id="infoGrid">
                <div class="info-item">
                    <div class="info-label" data-lang-content="en">Name</div>
                    <div class="info-label hidden" data-lang-content="ar">الاسم</div>
                    <div class="info-value" id="infoName">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label" data-lang-content="en">Email</div>
                    <div class="info-label hidden" data-lang-content="ar">البريد</div>
                    <div class="info-value" id="infoEmail">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label" data-lang-content="en">Username</div>
                    <div class="info-label hidden" data-lang-content="ar">اسم المستخدم</div>
                    <div class="info-value" id="infoUsername">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label" data-lang-content="en">Phone</div>
                    <div class="info-label hidden" data-lang-content="ar">الهاتف</div>
                    <div class="info-value" id="infoPhone">-</div>
                </div>
            </div>
        </div>

        <!-- My Assessments -->
        <div class="dash-section">
            <h2 class="section-title">
                <i class="fas fa-clipboard-check"></i>
                <span data-lang-content="en">My Assessments</span>
                <span class="hidden" data-lang-content="ar">تقييماتي</span>
            </h2>
            <div id="assessmentsList"></div>
        </div>

        <!-- My Explanations -->
        <div class="dash-section">
            <h2 class="section-title">
                <i class="fas fa-book"></i>
                <span data-lang-content="en">My Explanations</span>
                <span class="hidden" data-lang-content="ar">شروحاتي</span>
            </h2>
            <div id="explanationsList"></div>
        </div>

        <!-- My Videos -->
        <div class="dash-section">
            <h2 class="section-title">
                <i class="fas fa-video"></i>
                <span data-lang-content="en">My Videos</span>
                <span class="hidden" data-lang-content="ar">فيديوهاتي</span>
            </h2>
            <div class="placeholder-grid">
                <div class="placeholder-card">
                    <span data-lang-content="en">Coming Soon</span>
                    <span class="hidden" data-lang-content="ar">قريبا</span>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
